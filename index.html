<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>South West Financial Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header>
    <div class="header-inner">
        <a href="index.html" class="logo-wrap">
            <img src="images/logo_white.png" alt="South West Financial Management logo">
            <div class="logo-text">
                <span class="name">South West</span>
                <span class="sub">Financial Management</span>
            </div>
        </a>
    </div>
</header>

<!-- HERO -->
<div class="hero">
    <div class="hero-content">
        <span class="hero-eyebrow"></span>
        <h1>Website Under Maintenance</h1>
    </div>
</div>


<!-- FOOTER -->
<footer>
    <div class="footer-inner">
        <div class="footer-brand">
            <a href="index.html" class="logo-wrap">
                <img src="images/logo_white.png" alt="South West Financial Management">
                <div class="logo-text">
                    <span class="name">South West</span>
                    <span class="sub">Financial Management</span>
                </div>
            </a>
        </div>
        <div class="footer-col">
            <h4>Pages</h4>
            <a href="index.html">Home</a>
            <a href="index.html">About Us</a>
            <a href="index.html">Services</a>
            <a href="index.html">Contact Us</a>
        </div>
        <div class="footer-col">
            <h4>Contact</h4>
            <a href="mailto:info@southwestfm.co.uk">info@southwestfm.co.uk</a>
            <a href="tel:01234567890">07851141776</a>
        </div>
    </div>
    <div class="footer-bottom">
        <span>© 2026 South West Sums Ltd. All rights reserved.</span>
    </div>
</footer>
<script>
  window.addEventListener('scroll', () => {
    const header = document.querySelector('header');
    if (window.scrollY > 100) {
      header.style.background = 'rgba(29, 42, 58, 0.8)';
    } else {
      header.style.background = 'rgba(29, 42, 58, 1)';
    }
  });
</script>
</body>
</html>
